# Nginx reverse proxy for api.kirbgarage.com → Node on :4000
# CORS is handled by Node when CORS_ORIGIN=* is set (recommended).
# If Node CORS is not deployed yet, see nginx.cors-snippet.conf fallback.

map $http_origin $cors_allow_origin {
    default $http_origin;
    ""      "";
}

server {
    listen 80;
    server_name api.kirbgarage.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.kirbgarage.com;

    ssl_certificate     /etc/letsencrypt/live/api.kirbgarage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kirbgarage.com/privkey.pem;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_allow_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Cookie, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin $cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

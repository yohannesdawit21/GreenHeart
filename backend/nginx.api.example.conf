# Nginx reverse proxy for api.kirbgarage.com → Node on :4000
# Place in /etc/nginx/sites-available/api.kirbgarage.com then:
#   ln -s /etc/nginx/sites-available/api.kirbgarage.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# CORS is handled by the Node app (set CORS_ORIGIN=* in backend/.env).
# Do NOT add duplicate CORS headers here.

server {
    listen 80;
    server_name api.kirbgarage.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.kirbgarage.com;

    # certbot --nginx -d api.kirbgarage.com
    ssl_certificate     /etc/letsencrypt/live/api.kirbgarage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kirbgarage.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Required for Socket.io WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through preflight (OPTIONS) and all methods to Node
        proxy_pass_request_headers on;
    }
}
